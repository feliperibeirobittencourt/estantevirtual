name: Monitor Estante Virtual

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v4

      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar as dependências do projeto
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Rodar a checagem no Estante Virtual
        run: python monitor.py

      - name: Salvar o histórico e a planilha de volta no repositório
        run: |
          git config user.name "Monitor Estante Virtual"
          git config user.email "actions@users.noreply.github.com"
          git add historico.json achados_estante.xlsx
          git diff --quiet && git diff --cached --quiet || git commit -m "Checagem automática $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
